    <!-- Question:write a program to get students's number and show rank .if number was between 90 and 100 be A,if was between 80and 90 be Bوif was between 70and 80 be ز  , If it was less than 70, show "fail"-->
    <script>
         var number = Number(prompt("enter your number: "));
         if (number>=90 && number <=100) {
            alert('A');
         }
          else if (number>=80 && number <90) {
            alert('B');
         }
          else if (number>=70 && number <80) {
            alert('C');
         }
         else if( number>=0 && number < 70 ){
            alert('FAIL');
         }
         else{
            alert('ERROR');
         }
    </script>
