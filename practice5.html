    <!-- Question:Write a program that gets a number as the month's number and shows the season's name-->
    <script>
       var num1 = Number(prompt("enter your number1: "));
        if (num1==1 || num1==2 || num1==3) {
            alert("the season is spring");
        }
        else if (num1==4 || num1==5 || num1==6) {
            alert("the season is Summer")
        }
         else if  (num1==7 || num1==8 || num1==9) {
            alert("the season is Fall");
        }
         else if  (num1==10 || num1==11 || num1==12) {
            alert("the season is Winter");
        }
        else{
            alert("this is not seasons's number");
        }
       
    </script>
