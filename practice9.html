    <!-- Question:Write a program that takes 10 numbers from the user and prints the largest number-->
    <script>
      var max1 = 0;
      for (i=0;i<10;i++) {
       var number = Number(prompt("enter your number:"));
       if (number>max1) {
         max1 = number;
       }
      }
      document.write("max is : "+ max1)
    </script>
