<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>js-14-4</title>
    <!-- Question:write a program that gets number as day's number and show day's name -->
    <script>
      var number = Number(prompt("enter your number:"));
      if (number == 1) {
        alert("Saturday");
      }
      else if (number == 2) {
        alert("Sunday");
      }
      else if (number == 3) {
        alert("Monday");
      }
      else if (number == 4) {
        alert("Tuesday");
      }
      else if (number == 5) {
        alert("Wednesday");
      }
      else if (number == 6) {
        alert("Thursday");
      }
      else if (number == 7) {
        alert("Friday");
      }
      else{
        alert("error")
      }
    </script>
</head>

</body>
</html>
