<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>js-14-5.1</title>
    <!-- Question:write a aprogram to get season's numbers and show seasons'name-->
    <script>
         var number = Number(prompt("enter your number: "));
         switch (number) {
            case 1:
            case 2:
            case 3:
               alert("spring");
               break;
            case 4:
            case 5:
            case 6:
               alert("summer"); 
               break;
            case 7:
            case 8:
            case 9:
               alert("fall");
               break;
            case 10:
            case 11:
            case 12:
               alert("winter");
               break;
            default:
               alert("Error");
               break;
         }
    </script>
</head>
