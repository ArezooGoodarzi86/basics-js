    <!-- Question:Get 3 numbers as input and show the largest among them -->

       var num1 = Number(prompt("enter your number1: "));
       var num2 = Number(prompt("enter your number2: "));
       var num3 = Number(prompt("enter your number3: "));

        alert("num1 is the largest");
       }
       else if (num2 >= num1 && num2 >= num3) {

        alert("num3 is the largest");
       }
       
    </script>
