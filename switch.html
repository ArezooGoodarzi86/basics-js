<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>js-14-5.1</title>
    <script>
      var num =Number(prompt("enter your number:"));
      switch (num) {
        case 1:
            alert("Saturday");
            break;
        case 2:
            alert("Sunday");
            break;
        case 3:
            alert("Monday");
            break;
        case 4:
            alert("Tuesday");
            break;
        case 5:
            alert("Wednesday");
            break;
        case 6:
            alert("Thursday");
            break;
        case 7:
            alert("Friday");
            break;
        default:
            alert("Error");
            break;
      }
     
    </script>
</head>

</body>
</html>
